#quarkus.datasource.db-kind=postgresql
#quarkus.datasource.username=postgres
#quarkus.datasource.password=postgres

# For development only - Quarkus creates/drops tables automatically
quarkus.hibernate-orm.database.generation=drop-and-create

# Set root log level
quarkus.log.level=INFO

# Set specific log level for your package
quarkus.log.category."org.example".level=DEBUG

# Set log level for Quarkus internals (usually fine at INFO)
quarkus.log.category."io.quarkus".level=INFO

# Log all HTTP requests
quarkus.http.access-log.enabled=true

# Include the request path and response status
quarkus.http.access-log.pattern=combined

# Log to the same console output
quarkus.http.access-log.log-to-file=false

# Custom configuration
app.max-users-per-page=100
app.default-user-name=Guest

# Default (unprofiled) configuration - ensures nothing is active by mistake
quarkus.datasource.active=false
quarkus.hibernate-orm.active=false

# Flyway configuration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=1
quarkus.flyway.clean-disabled=false

# Dev mode configuration
%dev.quarkus.datasource.active=true
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=postgres
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.hibernate-orm.active=true

# Production (native) configuration - this is what your error requires
%prod.quarkus.datasource.active=true
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/postgres
%prod.quarkus.datasource.username=postgres
%prod.quarkus.datasource.password=postgres
%prod.quarkus.hibernate-orm.database.generation=update
%prod.quarkus.hibernate-orm.active=true

# Native optimizations
quarkus.native.enable-svm-hosted-check=false
quarkus.native.auto-service-loader-registration=true
quarkus.native.debug.enabled=false
